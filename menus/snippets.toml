["SQL/Unique Values"]

text = """WITH LatestRow AS (
    SELECT
	    *
        , ROW_NUMBER() OVER (PARTITION BY {column} ORDER BY {order_by} DESC) AS rn
	FROM
		{table})
SELECT
	*
FROM
    LatestRow
WHERE
	rn = 1
ORDER BY
    {order_by};"""

params = ["column", "order_by", "table"]


