["SQL/Delimit Carat (^)"]

text = """DECLARE @Result VARCHAR(MAX)
SELECT
    @Result = STRING_AGG({column}, '^')
FROM
    {table}
WHERE 
    {where_clause}

SELECT @Result AS FormattedResult;"""

params = ["column", "table", "where_clause"]


["SQL/Delimit Carat (,)"]

text = """DECLARE @Result VARCHAR(MAX)

SELECT
    @Result = '(' + STRING_AGG({column}, ', ') + ')'
FROM
    {table}
WHERE 
    {where_clause}

SELECT @Result AS FormattedResult;"""

params = ["column", "table","where_clause"]


["SQL/Select Statement"]

text = """SELECT TOP 50
    *
FROM
    {table}
WHERE
    {where_clause}
ORDER BY
    {order_by}"""

params = ["column", "table","where_clause"]


["SQL/Column Names"]

text = """SELECT
    c.name AS COLUMN_NAME
FROM
    sys.columns c
INNER JOIN sys.tables t ON c.object_id = t.object_id
WHERE
    t.name = {table}
ORDER BY
    c.column_id;"""

params = ["table"]

    
["SQL/Convert Datetime"]

text = """CONVERT(DATETIME, {column}, 103)"""

params = ["column"]

    
