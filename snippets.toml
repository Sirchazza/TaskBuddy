["SQL/Unique Values"]

text = """WITH LatestRow AS (
    SELECT
	    *
        , ROW_NUMBER() OVER (PARTITION BY {Column_Name} ORDER BY {Order_By} DESC) AS rn
	FROM
		{From_Table})
SELECT
	*
FROM
    LatestRow
WHERE
	rn = 1
ORDER BY
    {Order_By};"""

params = ["Column_Name", "From_Table", "Order_By"]


