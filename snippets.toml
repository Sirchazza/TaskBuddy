["SQL/Delimit Carat (^)"]

text = """DECLARE @Result VARCHAR(MAX)
SELECT
    @Result = STRING_AGG({Column_Name}, '^')
FROM
    {From_Table}
WHERE 
    {Where_Clause}

SELECT @Result AS FormattedResult;"""

params = ["Column_Name", "From_Table", "Where_Clause"]


["SQL/Delimit Carat (,)"]

text = """DECLARE @Result VARCHAR(MAX)

SELECT
    @Result = '(' + STRING_AGG({Column_Name}, ', ') + ')'
FROM
    {From_Table}
WHERE 
    {Where_Clause}

SELECT @Result AS FormattedResult;"""

params = ["Column_Name", "From_Table","Where_Clause"]


["SQL/Select Statement"]

text = """SELECT TOP 50
    *
FROM
    {From_Table}
WHERE
    {Where_Clause}
ORDER BY
    {Order_By}"""

params = ["From_Table","Where_Clause", "Order_By"]


["SQL/Column Names"]

text = """SELECT
    c.name AS COLUMN_NAME
FROM
    sys.columns c
INNER JOIN sys.tables t ON c.object_id = t.object_id
WHERE
    t.name = {From_Table}
ORDER BY
    c.column_id;"""

params = ["From_Table"]

    
["SQL/Convert Datetime"]

text = """CONVERT(DATETIME, {Column_Name}, 103)"""

params = ["Column_Name"]

    
